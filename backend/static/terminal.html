<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
  #terminal { width: 100%; height: 100%; }
  .xterm { padding: 2px; }
  #status {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 6px 12px; font-family: monospace; font-size: 13px;
    color: #aaa; background: rgba(26,26,46,0.95); z-index: 10;
    display: none;
  }
  #status.show { display: block; }
  #status.error { color: #e94560; }
  #status.connected { color: #4ade80; }
</style>
</head>
<body>
<div id="status"></div>
<div id="terminal"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var session = params.get('session');
  var token = params.get('token');

  if (!session || !token) {
    document.getElementById('status').textContent = 'Missing session or token';
    document.getElementById('status').className = 'show error';
    return;
  }

  // Pick font size based on screen width
  var fontSize = 11;
  var screenW = window.screen.width;
  if (screenW <= 480) fontSize = 11;
  else if (screenW <= 768) fontSize = 12;
  else fontSize = 14;

  var term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'bar',
    fontSize: fontSize,
    lineHeight: 1.15,
    letterSpacing: 0,
    fontFamily: "monospace",
    fontWeight: '400',
    fontWeightBold: '700',
    scrollback: 10000,
    scrollOnUserInput: true,
    convertEol: false,
    overviewRulerWidth: 0,
    theme: {
      background: '#1a1a2e',
      foreground: '#e0e0e0',
      cursor: '#e94560',
      cursorAccent: '#1a1a2e',
      selectionBackground: 'rgba(233,69,96,0.3)',
      black: '#1a1a2e',
      red: '#e94560',
      green: '#4ade80',
      yellow: '#fbbf24',
      blue: '#60a5fa',
      magenta: '#c084fc',
      cyan: '#22d3ee',
      white: '#e0e0e0',
      brightBlack: '#4a4a6a',
      brightRed: '#ff6b8a',
      brightGreen: '#6ee7a0',
      brightYellow: '#fcd34d',
      brightBlue: '#93bbfd',
      brightMagenta: '#d8b4fe',
      brightCyan: '#67e8f9',
      brightWhite: '#ffffff',
    },
    allowProposedApi: true,
  });

  var fitAddon = new FitAddon.FitAddon();
  var webLinksAddon = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(webLinksAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  var statusEl = document.getElementById('status');
  var ws = null;
  var reconnectTimer = null;
  var resizeTimer = null;

  function showStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'show ' + (cls || '');
    if (cls === 'connected') {
      setTimeout(function() { statusEl.className = ''; }, 2000);
    }
  }

  function wsSend(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    }
  }

  function connect() {
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsUrl = proto + '//' + location.host + '/claude-remote/api/terminals/ws/' + encodeURIComponent(session) + '?token=' + encodeURIComponent(token);

    showStatus('Connecting...', '');
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      showStatus('Connected', 'connected');
      sendResize();
    };

    ws.onmessage = function(ev) {
      if (ev.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(ev.data));
      } else {
        term.write(ev.data);
      }
    };

    ws.onclose = function() {
      showStatus('Disconnected — reconnecting...', 'error');
      scheduleReconnect();
    };

    ws.onerror = function() {
      showStatus('Connection error', 'error');
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function() {
      reconnectTimer = null;
      connect();
    }, 2000);
  }

  function sendResize() {
    wsSend(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
  }

  function onResize() {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      fitAddon.fit();
      sendResize();
    }, 100);
  }

  // Terminal text input -> WebSocket
  term.onData(function(data) {
    wsSend(data);
  });

  // Terminal binary input (mouse events) -> WebSocket
  term.onBinary(function(data) {
    var buf = new Uint8Array(data.length);
    for (var i = 0; i < data.length; i++) {
      buf[i] = data.charCodeAt(i) & 0xff;
    }
    wsSend(buf);
  });

  // Touch-to-scroll: convert touch swipes to mouse scroll events for tmux
  var touchState = null;
  var termEl = document.getElementById('terminal');

  termEl.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      touchState = { y: e.touches[0].clientY, scrolled: false };
    }
  }, { passive: true });

  termEl.addEventListener('touchmove', function(e) {
    if (!touchState || e.touches.length !== 1) return;
    var dy = touchState.y - e.touches[0].clientY;
    var threshold = 20; // pixels per scroll step

    if (Math.abs(dy) >= threshold) {
      var steps = Math.floor(Math.abs(dy) / threshold);
      touchState.y = e.touches[0].clientY;
      touchState.scrolled = true;

      // Send mouse wheel escape sequences (button 64=up, 65=down)
      // CSI M button col row  (button 64+32=96 for up, 65+32=97 for down)
      for (var i = 0; i < steps; i++) {
        if (dy > 0) {
          // Scroll up
          wsSend('\x1b[M' + String.fromCharCode(96) + String.fromCharCode(33) + String.fromCharCode(33));
        } else {
          // Scroll down
          wsSend('\x1b[M' + String.fromCharCode(97) + String.fromCharCode(33) + String.fromCharCode(33));
        }
      }
      e.preventDefault();
    }
  }, { passive: false });

  termEl.addEventListener('touchend', function() {
    touchState = null;
  }, { passive: true });

  window.addEventListener('resize', onResize);
  new ResizeObserver(onResize).observe(termEl);

  connect();
})();
</script>
</body>
</html>
